<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento vertical</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        #container{
            margin: auto;
            position: relative;
            height: 400px;
            width: 600px;
            background: purple url(imagens/target001.png) no-repeat top left/100% 100%;
            top: -50%;
        }

        #conteudo{
            position: absolute;
            height: 200px;
            width: 300px;
            background: yellow url(imagens/target001.png) no-repeat top left/100% 100%;

            left: 50%;
            top: 50%;

            transform: translate(-50%, -50%);

            z-index: 1;
        }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
