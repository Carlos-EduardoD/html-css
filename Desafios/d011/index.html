<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 012</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #container{
            position: relative;
            background: black url(espaco.jpg) no-repeat center center/cover fixed;
            height: 100vh;
        }

        #conteudo{
            position: absolute;
            border: 1px solid red;
            height: 400px;
            width: 350px;
            background: url(astronauta.png) no-repeat center center/cover;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="conteudo"></div>
    </div>
</body>
</html>
